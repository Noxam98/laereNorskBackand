name: tests
on:
  push:
    branches: [master]
  pull_request:
permissions:
  contents: read
jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - name: Install deps
        run: pip install -r requirements.txt -r requirements-dev.txt
      - name: Run test suite
        run: python -m pytest -q

  deploy:
    needs: pytest
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    concurrency: deploy-prod   # деплои не наслаиваются
    steps:
      - uses: actions/checkout@v4
      - name: Ключ и known_hosts
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          echo "[204.168.163.44]:2222 ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIBWVlHdClJpMXXxcJRbG6huD4OCiYIYnIKgs9uINWLxD" >> ~/.ssh/known_hosts
      - name: Rsync кода на VPS
        run: >
          rsync -az --delete
          --exclude .git --exclude .venv --exclude __pycache__
          --exclude '*.pyc' --exclude app.log
          -e "ssh -p 2222" ./ root@204.168.163.44:/opt/norsk/app/
      - name: Бэкап БД перед рестартом
        run: ssh -p 2222 root@204.168.163.44 '/opt/norsk/backup.sh'
      - name: Зависимости и рестарт (миграции применяются на старте)
        run: ssh -p 2222 root@204.168.163.44 'VIRTUAL_ENV=/opt/norsk/venv /root/.local/bin/uv pip install -q -r /opt/norsk/app/requirements.txt && chown -R norsk:norsk /opt/norsk/app && systemctl restart norsk'
      - name: Health-check (до 2 минут — на случай долгой миграции)
        run: |
          for i in $(seq 1 24); do
            code=$(curl -s -o /dev/null -w '%{http_code}' https://api.learnnorsk.space/changelog || true)
            [ "$code" = "401" ] && echo "ок за ~$((i*5))с" && exit 0
            sleep 5
          done
          echo "прод не ожил за 2 минуты (код: $code)"; exit 1
