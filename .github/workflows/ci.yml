name: tests
on:
  push:
    branches: [master]
  pull_request:
permissions:
  contents: read
jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - name: Install deps
        run: pip install -r requirements.txt -r requirements-dev.txt
      - name: Run test suite
        run: python -m pytest -q
