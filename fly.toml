app = "learn-norsk-backend"
primary_region = "arn"

[build]

[env]
  DATABASE_PATH = "/data/users.db"

[http_service]
  internal_port = 8080
  force_https = true
  # Не усыпляем машину: иначе ночью (без трафика) Fly останавливает VM
  # и фоновый autofill_loop умирает — ночной режим не работает.
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[mounts]
  source = "data"
  destination = "/data"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
